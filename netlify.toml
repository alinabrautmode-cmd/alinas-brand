[build]
  command = "npm run build"
  publish = "."

# Redirect old collection URLs to the new category structure
[[redirects]]
  from = "/catalog-2025"
  to = "/catalog-dresses.html"
  status = 301
  force = true

[[redirects]]
  from = "/catalog-2025.html"
  to = "/catalog-dresses.html"
  status = 301
  force = true

[[redirects]]
  from = "/catalog-2026"
  to = "/catalog-dresses.html"
  status = 301
  force = true

[[redirects]]
  from = "/catalog-2026.html"
  to = "/catalog-dresses.html"
  status = 301
  force = true

# Clean product URLs, e.g. /product/ab-2601 -> /product-ab-2601.html
[[redirects]]
  from = "/product/:article"
  to = "/product-:article.html"
  status = 200
